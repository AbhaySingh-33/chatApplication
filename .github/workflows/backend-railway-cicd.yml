name: Backend CI/CD to Railway

on:
  pull_request:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/backend-railway-cicd.yml
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/backend-railway-cicd.yml
  workflow_dispatch:

concurrency:
  group: backend-railway-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI (lint/test/docker-build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Run lint (if configured)
        run: npm run lint --if-present --prefix backend

      - name: Run tests (if configured)
        run: npm test --if-present --prefix backend

      - name: Validate Docker build
        run: docker build -f backend/Dockerfile -t chatapp-backend:ci backend

  build-and-push-image:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest
    needs: backend-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_ref: ${{ steps.export-image.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          missing=0
          for key in DOCKERHUB_USERNAME DOCKERHUB_TOKEN; do
            if [ -z "${!key}" ]; then
              echo "::error title=Missing secret::${key} is not configured in GitHub repository secrets."
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Set image name
        run: echo "IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/chatapp-backend" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=raw,value=03

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Export deployed image reference
        id: export-image
        run: echo "image_ref=${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA}" >> $GITHUB_OUTPUT

  deploy-backend-railway:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    needs: build-and-push-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Railway secrets
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
        run: |
          missing=0
          for key in RAILWAY_TOKEN RAILWAY_SERVICE; do
            if [ -z "${!key}" ]; then
              echo "::error title=Missing secret::${key} is not configured in GitHub repository secrets."
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Setup Node.js (for Railway CLI)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy backend service
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
        run: |
          TARGET_ENV="${RAILWAY_ENVIRONMENT:-production}"

          railway up \
            --service "$RAILWAY_SERVICE" \
            --environment "$TARGET_ENV" \
            --detach

      - name: Deployment summary
        run: |
          echo "Backend deployed to Railway service: ${{ secrets.RAILWAY_SERVICE }}"
          echo "Docker image pushed: ${{ needs.build-and-push-image.outputs.image_ref }}"
